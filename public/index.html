<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Exchange</title>
    <link rel="stylesheet" href="currancy.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/js/select2.min.js"></script>
    <script src="https://kit.fontawesome.com/YOUR_FA_KIT.js" crossorigin="anonymous"></script>

</head>
<body>

    <div class="whiteSpace">

        <div class="greenSpace">

           <div class="currancyIn">
              <input id="amount" name="amount" class="amount" type="number" placeholder="amount to exchange"/>
              <select id="currency1" class="curr1" ></select>
            </div>

            <div class="btnContainer">
              <button id="exchangeBtn" class="exchangeBtn">  
                <svg xmlns="http://www.w3.org/2000/svg" class="arrow-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" >
                  <line x1="12" y1="6" x2="12" y2="18"></line>
                  <polyline points="6 12 12 18 18 12"></polyline>
                </svg>
              </button>
            </div>
        
           <div class="currancyOut">
             <b id ="result" style="color: white;  ">The new amount is:</b> 
              <select id="currency2" class="curr2"></select>
           </div>

        </div>
        
    </div>
    <script src="currancy.js"></script>
</body>
</html>
